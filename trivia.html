<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Country Music Trivia – Trey Roberts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --navy: #1a2744; --gold: #c9993a; --light: #f8f6f1; --mid: #e8e3d9; }
    body { font-family: 'Inter', sans-serif; background: var(--light); }
    .navbar { background: var(--navy) !important; }
    .navbar-brand { font-family: 'Playfair Display', serif; color: var(--gold) !important; font-size: 1.4rem; }
    .nav-link { color: rgba(255,255,255,0.85) !important; font-size: 0.9rem; }
    .nav-link:hover, .nav-link.active { color: var(--gold) !important; }
    .page-hero { background: var(--navy); color: white; padding: 60px 0 50px; text-align: center; }
    .page-hero h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--gold); }
    .page-hero p { color: rgba(255,255,255,0.65); font-size: 1rem; margin-top: 0.5rem; }

    #trivia-app { max-width: 700px; margin: 3rem auto; padding: 0 1rem 4rem; }
    .score-bar { display: flex; justify-content: space-between; align-items: center; background: var(--navy); color: white; padding: 0.8rem 1.4rem; border-radius: 8px; margin-bottom: 2rem; font-size: 0.9rem; }
    .score-bar span { color: var(--gold); font-weight: 600; font-size: 1.1rem; }
    .question-card { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 16px rgba(0,0,0,0.08); margin-bottom: 1.5rem; }
    .q-num { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 0.5rem; }
    .q-text { font-size: 1.15rem; font-weight: 600; color: var(--navy); line-height: 1.5; }
    .choices { display: grid; gap: 0.75rem; margin-top: 1.5rem; }
    .choice-btn {
      background: var(--mid);
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 0.85rem 1.2rem;
      text-align: left;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.18s;
      font-family: 'Inter', sans-serif;
      color: var(--navy);
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--gold); background: #fdf6ec; }
    .choice-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; }
    .choice-btn.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }
    .choice-btn:disabled { cursor: default; }
    .feedback { margin-top: 1rem; padding: 0.9rem 1.2rem; border-radius: 8px; font-size: 0.92rem; line-height: 1.5; }
    .feedback.correct { background: #d4edda; color: #155724; }
    .feedback.wrong { background: #f8d7da; color: #721c24; }
    #next-btn { background: var(--navy); color: white; border: none; border-radius: 8px; padding: 0.75rem 2rem; font-size: 0.95rem; cursor: pointer; display: none; margin-top: 1rem; transition: background 0.2s; }
    #next-btn:hover { background: var(--gold); }
    #result-screen { display: none; text-align: center; background: white; border-radius: 12px; padding: 3rem 2rem; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
    #result-screen h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--navy); }
    #result-score { font-size: 3.5rem; font-weight: 700; color: var(--gold); margin: 1rem 0; }
    #result-msg { color: #555; margin-bottom: 1.5rem; }
    #restart-btn { background: var(--navy); color: white; border: none; border-radius: 8px; padding: 0.8rem 2.2rem; font-size: 1rem; cursor: pointer; }
    #restart-btn:hover { background: var(--gold); }

    footer { background: var(--navy); color: rgba(255,255,255,0.5); text-align: center; padding: 1.5rem; font-size: 0.82rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">Trey Roberts</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-2">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="scratch.html">Country Music</a></li>
        <li class="nav-item"><a class="nav-link" href="filmroom.html">Film Room</a></li>
        <li class="nav-item"><a class="nav-link" href="dataviz.html">Data Viz</a></li>
        <li class="nav-item"><a class="nav-link active" href="trivia.html">Trivia</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="page-hero">
  <div class="container">
    <h1>Country Music Trivia</h1>
    <p>Test your knowledge of country music history, artists, and hits.</p>
  </div>
</div>

<div id="trivia-app">

  <div id="game-screen">
    <div class="score-bar">
      <div>Question <span id="q-counter">1</span> of <span id="q-total">10</span></div>
      <div>Score: <span id="score-display">0</span></div>
    </div>
    <div class="question-card">
      <div class="q-num" id="q-num-label">Question 1</div>
      <div class="q-text" id="question-text"></div>
      <div class="choices" id="choices-container"></div>
      <div class="feedback" id="feedback" style="display:none;"></div>
    </div>
    <button id="next-btn" onclick="nextQuestion()">Next Question →</button>
  </div>

  <div id="result-screen">
    <h2>Quiz Complete!</h2>
    <div id="result-score"></div>
    <p id="result-msg"></p>
    <button id="restart-btn" onclick="startGame()">Play Again</button>
  </div>

</div>

<footer>
  <p class="mb-0">&copy; 2025 Trey Lance Roberts</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Full country music trivia question bank
  const questionBank = [
    { question: "Who is known as 'The King of Country Music' with over 60 number-one hits?", choices: ["A) George Strait", "B) Garth Brooks", "C) Alan Jackson", "D) Vince Gill"], answer: "A) George Strait", explanation: "George Strait holds the record for the most number-one singles in any genre, with over 60." },
    { question: "What year did the Grand Ole Opry first air on the radio?", choices: ["A) 1910", "B) 1925", "C) 1940", "D) 1955"], answer: "B) 1925", explanation: "The Grand Ole Opry began broadcasting from Nashville in 1925 and is still running today." },
    { question: "Which artist's debut album was 'Dangerous: The Double Album'?", choices: ["A) Luke Combs", "B) Morgan Wallen", "C) Jon Pardi", "D) Cole Swindell"], answer: "B) Morgan Wallen", explanation: "Morgan Wallen's 'Dangerous: The Double Album' became one of the best-selling country albums of the 2020s." },
    { question: "Which song catapulted Zach Bryan to fame after he posted it from a Navy base?", choices: ["A) Heading South", "B) Something in the Orange", "C) Highway Boys", "D) Open the Gate"], answer: "B) Something in the Orange", explanation: "Zach Bryan's raw acoustic videos, including this song, went viral while he was still active duty." },
    { question: "Who is widely considered the best pure vocalist in modern country music, blending country, blues, and soul?", choices: ["A) Chris Stapleton", "B) Eric Church", "C) Sam Hunt", "D) Thomas Rhett"], answer: "A) Chris Stapleton", explanation: "Chris Stapleton's powerful voice and genre-blending style have earned him numerous Grammy and CMA awards." },
    { question: "Which country music award show is held annually in Nashville and hosted by the Country Music Association?", choices: ["A) ACM Awards", "B) CMA Awards", "C) CMT Awards", "D) Grammy Awards"], answer: "B) CMA Awards", explanation: "The CMA Awards, run by the Country Music Association, has been held annually since 1967." },
    { question: "Which legendary duo is known for the hit 'Islands in the Stream'?", choices: ["A) Johnny Cash & June Carter", "B) Loretta Lynn & Conway Twitty", "C) Kenny Rogers & Dolly Parton", "D) Brooks & Dunn"], answer: "C) Kenny Rogers & Dolly Parton", explanation: "'Islands in the Stream' was written by the Bee Gees and became a chart-topping duet in 1983." },
    { question: "What instrument is most associated with traditional bluegrass and country music?", choices: ["A) Saxophone", "B) Banjo", "C) Trumpet", "D) Cello"], answer: "B) Banjo", explanation: "The banjo, brought to America through African and Appalachian traditions, became a defining sound of country and bluegrass." },
    { question: "Which female artist is known as 'The Queen of Country Music' with hits like 'Coal Miner's Daughter'?", choices: ["A) Reba McEntire", "B) Loretta Lynn", "C) Tammy Wynette", "D) Patsy Cline"], answer: "B) Loretta Lynn", explanation: "Loretta Lynn earned the title through her decades-long career and deeply personal songwriting." },
    { question: "Which Luke Combs song became one of the most-streamed country songs after going viral on TikTok in 2023?", choices: ["A) Beautiful Crazy", "B) Fast Car", "C) When It Rains It Pours", "D) Hurricane"], answer: "B) Fast Car", explanation: "Luke Combs' cover of Tracy Chapman's 'Fast Car' hit number one and introduced the song to a new generation." },
    { question: "Which city is widely considered the heart of the country music industry?", choices: ["A) Austin, TX", "B) Memphis, TN", "C) Nashville, TN", "D) Atlanta, GA"], answer: "C) Nashville, TN", explanation: "Nashville, nicknamed 'Music City,' is home to the Grand Ole Opry and most major country record labels." },
    { question: "Who wrote and originally performed 'I Will Always Love You' before Whitney Houston's famous cover?", choices: ["A) Dolly Parton", "B) Reba McEntire", "C) Patsy Cline", "D) Tammy Wynette"], answer: "A) Dolly Parton", explanation: "Dolly Parton wrote and recorded the song in 1973, long before Whitney Houston's iconic 1992 version." },
    { question: "Which country artist released the hit album 'Fearless' before transitioning to pop music?", choices: ["A) Carrie Underwood", "B) Taylor Swift", "C) Miranda Lambert", "D) Kacey Musgraves"], answer: "B) Taylor Swift", explanation: "Taylor Swift began her career in country music, with 'Fearless' winning Album of the Year at the 2010 Grammys." },
    { question: "What is the term for the twangy, melodic guitar technique commonly used in country music?", choices: ["A) Tapping", "B) Pedal steel", "C) Slap bass", "D) Power chord"], answer: "B) Pedal steel", explanation: "The pedal steel guitar produces the smooth, sliding sound heard throughout classic and modern country music." },
    { question: "Which artist's real name is Stefani Joanne Angelina Germanotta? (Trick question — she's NOT country!) Which of these IS a country artist?", choices: ["A) Lady Gaga", "B) Carrie Underwood", "C) Beyoncé", "D) Rihanna"], answer: "B) Carrie Underwood", explanation: "Carrie Underwood rose to fame after winning American Idol in 2005 and became one of country's biggest stars." },
    { question: "Which song by Johnny Cash was famously recorded live at a California prison?", choices: ["A) Ring of Fire", "B) Folsom Prison Blues", "C) I Walk the Line", "D) Hurt"], answer: "B) Folsom Prison Blues", explanation: "Johnny Cash recorded 'At Folsom Prison' live in 1968, and it became one of the most iconic live albums in music history." },
    { question: "Which young artist is known for blending country with hip-hop influences in songs like 'Old Town Road'?", choices: ["A) Jimmie Allen", "B) Kane Brown", "C) Lil Nas X", "D) Jelly Roll"], answer: "C) Lil Nas X", explanation: "'Old Town Road' became a genre-blending sensation, spending a record-breaking number of weeks at number one." },
    { question: "What is the name of the famous country music history museum located in Nashville?", choices: ["A) Country Music Hall of Fame", "B) Opry Museum", "C) Music Row Archive", "D) Nashville Sound Center"], answer: "A) Country Music Hall of Fame", explanation: "The Country Music Hall of Fame and Museum preserves the genre's history and inducts its greatest legends." },
    { question: "Which artist had a major comeback and viral hit with 'I Remember Everything' featuring Kacey Musgraves?", choices: ["A) Zach Bryan", "B) Cody Johnson", "C) Riley Green", "D) Hardy"], answer: "A) Zach Bryan", explanation: "Zach Bryan's duet with Kacey Musgraves became a massive crossover hit and won a Grammy." },
    { question: "What state is often credited as the birthplace of modern country music thanks to the 1927 Bristol Sessions?", choices: ["A) Texas", "B) Tennessee", "C) Kentucky", "D) Virginia"], answer: "D) Virginia", explanation: "The Bristol Sessions, recorded in Bristol on the Tennessee-Virginia border, are often called the 'Big Bang of Country Music.'" }
  ];

  let questions = [];
  let currentQ = 0;
  let score = 0;
  let answered = false;

  function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startGame() {
    currentQ = 0;
    score = 0;
    answered = false;
    questions = shuffleArray(questionBank).slice(0, 10);

    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    document.getElementById('q-total').textContent = questions.length;

    showQuestion();
  }

  function showQuestion() {
    const q = questions[currentQ];
    document.getElementById('q-counter').textContent = currentQ + 1;
    document.getElementById('score-display').textContent = score;
    document.getElementById('q-num-label').textContent = `Question ${currentQ + 1}`;
    document.getElementById('question-text').textContent = q.question;
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    answered = false;

    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    q.choices.forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice;
      btn.onclick = () => selectAnswer(choice, btn);
      container.appendChild(btn);
    });
  }

  function selectAnswer(choice, btn) {
    if (answered) return;
    answered = true;

    const q = questions[currentQ];
    const allBtns = document.querySelectorAll('.choice-btn');
    allBtns.forEach(b => b.disabled = true);

    const fb = document.getElementById('feedback');
    if (choice === q.answer) {
      btn.classList.add('correct');
      score++;
      fb.className = 'feedback correct';
      fb.textContent = '✓ Correct! ' + q.explanation;
    } else {
      btn.classList.add('wrong');
      allBtns.forEach(b => { if (b.textContent === q.answer) b.classList.add('correct'); });
      fb.className = 'feedback wrong';
      fb.textContent = '✗ Not quite. ' + q.explanation;
    }
    fb.style.display = 'block';
    document.getElementById('score-display').textContent = score;
    document.getElementById('next-btn').style.display = 'inline-block';
  }

  function nextQuestion() {
    currentQ++;
    if (currentQ >= questions.length) {
      showResult();
    } else {
      showQuestion();
    }
  }

  function showResult() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('result-score').textContent = score + ' / ' + questions.length;
    let msg = '';
    const pct = score / questions.length;
    if (pct === 1) msg = "Perfect score! You're a true country music expert!";
    else if (pct >= 0.8) msg = "Great job! You really know your country music.";
    else if (pct >= 0.6) msg = "Not bad! Keep listening and you'll ace it next time.";
    else msg = "Keep listening to more country — you'll get there!";
    document.getElementById('result-msg').textContent = msg;
  }

  startGame();
</script>
</body>
</html>
