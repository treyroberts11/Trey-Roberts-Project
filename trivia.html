<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Country Music Trivia – Trey Roberts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --navy: #1a2744; --gold: #c9993a; --light: #f8f6f1; --mid: #e8e3d9; }
    body { font-family: 'Inter', sans-serif; background: var(--light); }
    .navbar { background: var(--navy) !important; }
    .navbar-brand { font-family: 'Playfair Display', serif; color: var(--gold) !important; font-size: 1.4rem; }
    .nav-link { color: rgba(255,255,255,0.85) !important; font-size: 0.9rem; }
    .nav-link:hover, .nav-link.active { color: var(--gold) !important; }
    .page-hero { background: var(--navy); color: white; padding: 60px 0 50px; text-align: center; }
    .page-hero h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--gold); }
    .page-hero p { color: rgba(255,255,255,0.65); font-size: 1rem; margin-top: 0.5rem; }

    /* TRIVIA GAME */
    #trivia-app { max-width: 700px; margin: 3rem auto; padding: 0 1rem 4rem; }
    .score-bar { display: flex; justify-content: space-between; align-items: center; background: var(--navy); color: white; padding: 0.8rem 1.4rem; border-radius: 8px; margin-bottom: 2rem; font-size: 0.9rem; }
    .score-bar span { color: var(--gold); font-weight: 600; font-size: 1.1rem; }
    .question-card { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 16px rgba(0,0,0,0.08); margin-bottom: 1.5rem; }
    .q-num { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 0.5rem; }
    .q-text { font-size: 1.15rem; font-weight: 600; color: var(--navy); line-height: 1.5; }
    .choices { display: grid; gap: 0.75rem; margin-top: 1.5rem; }
    .choice-btn {
      background: var(--mid);
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 0.85rem 1.2rem;
      text-align: left;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.18s;
      font-family: 'Inter', sans-serif;
      color: var(--navy);
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--gold); background: #fdf6ec; }
    .choice-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; }
    .choice-btn.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }
    .choice-btn:disabled { cursor: default; }
    .feedback { margin-top: 1rem; padding: 0.9rem 1.2rem; border-radius: 8px; font-size: 0.92rem; line-height: 1.5; }
    .feedback.correct { background: #d4edda; color: #155724; }
    .feedback.wrong { background: #f8d7da; color: #721c24; }
    #next-btn { background: var(--navy); color: white; border: none; border-radius: 8px; padding: 0.75rem 2rem; font-size: 0.95rem; cursor: pointer; display: none; margin-top: 1rem; transition: background 0.2s; }
    #next-btn:hover { background: var(--gold); }
    #result-screen { display: none; text-align: center; background: white; border-radius: 12px; padding: 3rem 2rem; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
    #result-screen h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--navy); }
    #result-score { font-size: 3.5rem; font-weight: 700; color: var(--gold); margin: 1rem 0; }
    #result-msg { color: #555; margin-bottom: 1.5rem; }
    #restart-btn { background: var(--navy); color: white; border: none; border-radius: 8px; padding: 0.8rem 2.2rem; font-size: 1rem; cursor: pointer; }
    #restart-btn:hover { background: var(--gold); }
    #loading-screen { text-align: center; padding: 3rem; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--mid); border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { background: var(--navy); color: rgba(255,255,255,0.5); text-align: center; padding: 1.5rem; font-size: 0.82rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">Trey Roberts</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-2">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="scratch.html">Country Music</a></li>
        <li class="nav-item"><a class="nav-link" href="filmroom.html">Film Room</a></li>
        <li class="nav-item"><a class="nav-link" href="dataviz.html">Data Viz</a></li>
        <li class="nav-item"><a class="nav-link active" href="trivia.html">Trivia</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="page-hero">
  <div class="container">
    <h1>Country Music Trivia</h1>
    <p>Test your knowledge — powered by AI for a fresh quiz every time.</p>
  </div>
</div>

<div id="trivia-app">

  <!-- LOADING -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p style="color:#777;">Generating your trivia questions...</p>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" style="display:none;">
    <div class="score-bar">
      <div>Question <span id="q-counter">1</span> of 10</div>
      <div>Score: <span id="score-display">0</span></div>
    </div>
    <div class="question-card">
      <div class="q-num" id="q-num-label">Question 1</div>
      <div class="q-text" id="question-text"></div>
      <div class="choices" id="choices-container"></div>
      <div class="feedback" id="feedback" style="display:none;"></div>
    </div>
    <button id="next-btn" onclick="nextQuestion()">Next Question →</button>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen">
    <h2>Quiz Complete!</h2>
    <div id="result-score"></div>
    <p id="result-msg"></p>
    <button id="restart-btn" onclick="startGame()">Play Again</button>
  </div>

</div>

<footer>
  <p class="mb-0">&copy; 2025 Trey Lance Roberts</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let questions = [];
  let currentQ = 0;
  let score = 0;
  let answered = false;

  async function startGame() {
    currentQ = 0;
    score = 0;
    answered = false;
    questions = [];

    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('loading-screen').style.display = 'block';

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: `Generate exactly 10 country music trivia questions. Return ONLY a JSON array, no markdown, no backticks, no explanation. Each element must have exactly these fields:
{
  "question": "the question text",
  "choices": ["A) option", "B) option", "C) option", "D) option"],
  "answer": "A) option",
  "explanation": "short fun explanation of why this is correct"
}
Make questions varied in difficulty. Topics should include artists, songs, albums, history, awards, and fun facts. The answer must be one of the four choices exactly as written.`
          }]
        })
      });

      const data = await response.json();
      const raw = data.content[0].text.trim();
      questions = JSON.parse(raw);

      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'block';
      showQuestion();
    } catch (err) {
      document.getElementById('loading-screen').innerHTML = '<p style="color:red;">Failed to load questions. Please refresh and try again.</p>';
      console.error(err);
    }
  }

  function showQuestion() {
    const q = questions[currentQ];
    document.getElementById('q-counter').textContent = currentQ + 1;
    document.getElementById('score-display').textContent = score;
    document.getElementById('q-num-label').textContent = `Question ${currentQ + 1}`;
    document.getElementById('question-text').textContent = q.question;
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    answered = false;

    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    q.choices.forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice;
      btn.onclick = () => selectAnswer(choice, btn);
      container.appendChild(btn);
    });
  }

  function selectAnswer(choice, btn) {
    if (answered) return;
    answered = true;

    const q = questions[currentQ];
    const allBtns = document.querySelectorAll('.choice-btn');
    allBtns.forEach(b => b.disabled = true);

    const fb = document.getElementById('feedback');
    if (choice === q.answer) {
      btn.classList.add('correct');
      score++;
      fb.className = 'feedback correct';
      fb.textContent = '✓ Correct! ' + q.explanation;
    } else {
      btn.classList.add('wrong');
      allBtns.forEach(b => { if (b.textContent === q.answer) b.classList.add('correct'); });
      fb.className = 'feedback wrong';
      fb.textContent = '✗ Not quite. ' + q.explanation;
    }
    fb.style.display = 'block';
    document.getElementById('score-display').textContent = score;
    document.getElementById('next-btn').style.display = 'inline-block';
  }

  function nextQuestion() {
    currentQ++;
    if (currentQ >= questions.length) {
      showResult();
    } else {
      showQuestion();
    }
  }

  function showResult() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('result-score').textContent = score + ' / ' + questions.length;
    let msg = '';
    const pct = score / questions.length;
    if (pct === 1) msg = "Perfect score! You're a true country music expert!";
    else if (pct >= 0.8) msg = "Great job! You really know your country music.";
    else if (pct >= 0.6) msg = "Not bad! Keep listening and you'll ace it next time.";
    else msg = "Keep listening to more country — you'll get there!";
    document.getElementById('result-msg').textContent = msg;
  }

  // Start on load
  startGame();
</script>
</body>
</html>
